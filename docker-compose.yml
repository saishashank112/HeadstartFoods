version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: headstart_foods
    ports:
      - '3306:3306'
    volumes:
      - ./mysql_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5001:5001'
    environment:
      DATABASE_URL: mysql://root:root@db:3306/headstart_foods
      PORT: 5001
      JWT_SECRET: headstart_foods_secret_2026_premium_mango
    depends_on:
      - db

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
    depends_on:
      - backend
